<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thread-the-Needle Thursday</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }
 
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
 
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }
 
    h1 {
      margin-top: 0;
    }
 
    .sub {
      color: #6b7280;
    }
 
    .scene {
      margin-bottom: 20px;
    }
 
    .scene img {
      width: 100%;
      max-width: 100%;
      border-radius: 12px;
      display: block;
      margin-bottom: 10px;
    }
 
    .clue-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }
 
    .clue {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      cursor: grab;
    }
 
    .clue.dragging {
      opacity: 0.5;
    }
 
    .clue.correct {
      background: #dcfce7;
      border-color: #166534;
    }
 
    .clue.incorrect {
      background: #fee2e2;
      border-color: #991b1b;
    }
 
    .controls {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
 
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
    }
 
    .primary {
      background: #2563eb;
      color: white;
    }
 
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
 
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      display: none;
      font-weight: bold;
    }
 
    .status.show {
      display: block;
    }
 
    .good {
      background: #dcfce7;
      color: #166534;
    }
 
    .bad {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>It’s Thread-the-Needle Thursday, everyone.</h1>
      <p class="sub">Arrange the clues from broadest to most specific.</p>
 
      <div class="scene">
        <img
          src="classroom.png"
          alt="Classroom scene"
        />
        <p><strong>Scene:</strong> Classroom scene with students near the window side.</p>
      </div>
 
      <h2>Reorder the Clues</h2>
      <div class="clue-list" id="clueList"></div>
 
      <div class="controls">
        <button class="primary" onclick="checkOrder()">Check Order</button>
        <button class="secondary" onclick="shuffleClues()">Shuffle</button>
        <button class="secondary" onclick="showAnswer()">Show Answer</button>
      </div>
 
      <div class="status" id="status"></div>
    </div>
  </div>
 
  <script>
    const correctClues = [
      "This person is a student.",
      "This person is near the window side of the room.",
      "This person is the one not sitting.",
      "This person has brown hair.",
      "This person is wearing glasses."
    ];
 
    let draggedItem = null;
 
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
 
    function renderClues(items) {
      const clueList = document.getElementById("clueList");
      clueList.innerHTML = "";
 
      items.forEach((text, index) => {
        const clue = document.createElement("div");
        clue.className = "clue";
        clue.draggable = true;
        clue.dataset.value = text;
        clue.textContent = "Clue " + (index + 1) + ": " + text;
 
        clue.addEventListener("dragstart", () => {
          draggedItem = clue;
          clue.classList.add("dragging");
        });
 
        clue.addEventListener("dragend", () => {
          clue.classList.remove("dragging");
          draggedItem = null;
          updateLabels();
        });
 
        clue.addEventListener("dragover", (e) => {
          e.preventDefault();
          if (!draggedItem || draggedItem === clue) return;
 
          const rect = clue.getBoundingClientRect();
          const offset = e.clientY - rect.top;
          const midpoint = rect.height / 2;
 
          if (offset < midpoint) {
            clueList.insertBefore(draggedItem, clue);
          } else {
            clueList.insertBefore(draggedItem, clue.nextSibling);
          }
        });
 
        clueList.appendChild(clue);
      });
    }
 
    function updateLabels() {
      const clues = document.querySelectorAll(".clue");
      clues.forEach((clue, index) => {
        clue.textContent = "Clue " + (index + 1) + ": " + clue.dataset.value;
      });
    }
 
    function checkOrder() {
      const clues = document.querySelectorAll(".clue");
      let correctCount = 0;
 
      clues.forEach((clue, index) => {
        clue.classList.remove("correct", "incorrect");
        if (clue.dataset.value === correctClues[index]) {
          clue.classList.add("correct");
          correctCount++;
        } else {
          clue.classList.add("incorrect");
        }
      });
 
      const status = document.getElementById("status");
      status.classList.add("show");
 
      if (correctCount === correctClues.length) {
        status.className = "status show good";
        status.textContent = "Excellent. The order is correct.";
      } else {
        status.className = "status show bad";
        status.textContent = "You got " + correctCount + " out of " + correctClues.length + " correct.";
      }
    }
 
    function shuffleClues() {
      document.getElementById("status").className = "status";
      renderClues(shuffle(correctClues));
    }
 
    function showAnswer() {
      renderClues(correctClues);
      document.getElementById("status").className = "status show good";
      document.getElementById("status").textContent = "Answer revealed.";
    }
 
    renderClues(shuffle(correctClues));
  </script>
</body>
</html>
